<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>game</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Georgia", "Times New Roman", serif;
}
body{
  background:#1a1410;
  background-image:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.85)),url("https://img.pptstore.net/20210607/1623083931871298.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#e0d8c8;
  padding:20px;
}
.game-container{
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:center;
}

.character-sprite{
  width:80px;
  height:100px;
  border:2px solid #c9a82d;
  border-radius:4px;
  background:#111;
  overflow:hidden;
}
.character-sprite img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.dialog-box{
  width:100%;
  min-height:220px;
  border:3px solid #c9a82d;
  border-radius:6px;
  background:rgba(20,15,10,0.92);
  padding:20px;
  font-size:17px;
  line-height:1.8;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  white-space:pre-line;
  word-break:break-all;
}

/* 细线条原生打字光标 */
#cursor{
  display:inline;
  width: 1px;
  height: 1.1em;
  background-color: rgba(255,255,255,0.9);
  vertical-align: baseline;
  animation: blink 1.1s infinite;
  margin-left: 1px;
}
@keyframes blink{
  0%,45% { opacity:1; }
  55%,100% { opacity:0; }
}

.options-area{
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
  margin-top:4px;
}

.option-btn{
  padding:11px 30px;
  border:2px solid #c9a82d;
  border-radius:4px;
  background:#2d2218;
  color:#f8d762;
  font-size:16px;
  cursor:pointer;
  transition:0.25s;
}
.option-btn:hover{
  background:#c9a82d;
  color:#111;
  transform:scale(1.05);
}

.wish-input{
  padding:10px 14px;
  font-size:16px;
  width:260px;
  border:2px solid #c9a82d;
  border-radius:4px;
  background:#222;
  color:#fff;
  outline:none;
}
</style>
</head>
<body>

<div class="game-container">
  <div class="character-sprite">
    <img id="characterImg" src="" alt="角色">
  </div>

  <div class="dialog-box">
    <span id="text"></span>
  </div>

  <div class="options-area" id="optionsArea"></div>
</div>

<script>
const story = [
  { c:"kaluo.png", t:"你睁开眼，自己都没意识到自己什么时候在魔法史课上睡着了。" },
  { c:"kaluo.png", t:"环顾一周后，你并没找到两个熟悉的身影，教室里空荡荡的，夕阳昏黄的光芒懒洋洋地钻进教室。" },
  { c:"kaluo.png", t:"“那两个家伙去哪了？”" },
  { c:"kaluo.png", t:"你叹了口气，站起身，收拾了一下平摊在桌上的纸笔，准备找一下自己两个不省心的伙伴。" },
  { c:"kaluo.png", t:"要去哪里呢？", opt:[
    {t:"图书馆",n:5},
    {t:"食堂",n:9},
    {t:"主楼",n:13}
  ]},

  { c:"kaluo.png", t:"你小心翼翼走进图书馆，放眼望去全是专注地进行着OWLs复习的巫师。" },
  { c:"kaluo.png", t:"轻手轻脚游走了一圈后，你没有找到那两个熟悉的身影。" },
  { c:"kaluo.png", t:"离开时你不小心碰倒一堆书，引来众人侧目，你只好收拾好后一边鞠躬道歉一边离开。" },
  { c:"kaluo.png", t:"看来不在这里呢。", back:true },

  { c:"kaluo.png", t:"你发现现在已经是晚饭时间了，于是循着饭香来到一如既往热闹的食堂。" },
  { c:"kaluo.png", t:"已经有不少巫师坐在餐桌上了，你扫了一眼，依旧是一堆南瓜制品，你叹了口气。" },
  { c:"kaluo.png", t:"看来不在这里呢。", back:true },

  { c:"kaluo.png", t:"你走出走廊，试图在下课的巫师堆里找到那两个人。" },
  { c:"kaluo.png", t:"巫师们和你擦肩而过，你不知不觉走到阳台，站在护栏边眺望远方的禁林。" },
  { c:"kaluo.png", t:"阳光已经快要完全消失在地平线了，你还是没找到他们。" },
  { c:"kaluo.png", t:"看来不在这里呢。", back:true },

  { c:"kaluo.png", t:"你走到庭院里，夜晚已经悄悄来临，你抬头望去星星在夜空里闪烁。" },
  { c:"kaluo.png", t:"“有点饿了...”" },
  { c:"kaluo.png", t:"你叹息一声，对这两个不省心的家伙表示头疼，决定先回寝室一趟。" },
  { c:"kaluo.png", t:"格兰芬多休息室里一如既往的热闹，壁炉中摇曳的火光照在你黑色的校袍外部。" },
  { c:"kaluo.png", t:"你没理会叽叽喳喳的同学们，径直走向自己的寝室。" },
  { c:"kaluo.png", t:"你站在寝室门口，一墙之隔的寝室里没有任何声响，整个走廊都静悄悄的。" },
  { c:"kaluo.png", t:"你没放在心上，推开门。" },
  { c:"kaluo.png", t:"室内只有靠近窗台那一侧有一点夜光，窗户开着，风把窗帘带的呼呼作响。" },
  { c:"kaluo.png", t:"“温特他们又没关窗...”" },
  { c:"kaluo.png", t:"你随手关上门，走向窗户，伸出手把窗户拉过来。" },

  { c:"kaluo.png", t:"“生日快乐！卡洛！”" },
  { c:"kaluo.png", t:"“什么？”" },
  { c:"kaluo.png", t:"你吓了一跳，寝室的灯不知道什么时候开了，整个屋子里亮堂堂的，你被光线晃了一下眼睛。" },
  { c:"kaluo.png", t:"这时才看到窜出来突然把你抱住的人正是你找了一下午的尤利娅。" },
  { c:"kaluo.png", t:"温特从床后面探出头，捧着蛋糕朝你走过来。" },
  { c:"kaluo.png", t:"“尤利娅？温特？”" },

  { c:"youliya.png", t:"“是我们呀是我们呀~”" },
  { c:"youliya.png", t:"惊不惊喜！HAPPY BIRTHDAY！！！" },

  { c:"kaluo.png", t:"你这个时候才意识到今天这两人神秘失踪的原因，看着蹭了一身灰的尤利娅有点无奈。" },
  { c:"kaluo.png", t:"“温特就算了...你怎么进来的，明明有反女生魔法...”" },
  { c:"kaluo.png", t:"你目光移到旁边一言不发，努力插上蜡烛后小心翼翼控制魔法试图把它们点燃的黑发男子身上。" },
  { c:"kaluo.png", t:"温特慢吞吞地抬起头。" },

  { c:"wente.png", t:"...爬墙..." },
  { c:"wente.png", t:"他终于把火点燃了，几根五颜六色的蜡烛在涂的歪七扭八的蛋糕上热烈地燃着欢快的火焰。" },

  { c:"youliya.png", t:"她热情地把你拉过去。" },
  { c:"youliya.png", t:"快来许个愿呀--" },

  { c:"wente.png", t:"他捧着蛋糕凑到你面前。" },

  { c:"kaluo.png", t:"..." },
  { c:"kaluo.png", t:"你叹了口气，双手合十闭上眼睛。" },
  { c:"kaluo.png", t:"许个愿吧：", input:true },

  { c:"kaluo.png", t:"你睁开眼睛，一口气吹掉面前的几根蜡烛。" },
  { c:"kaluo.png", t:"温特的眼睛亮晶晶的，尤利娅凑过来非要帮你切蛋糕。" },
  { c:"kaluo.png", t:"蛋糕当然是切的歪东倒西的，奶油塌下来，你用食指刮了一点放进嘴里。" },
  { c:"kaluo.png", t:"嗯，还挺甜的。", end:true }
];

const typingSpeed = 35;
let index = 0;
let visited = new Set();

const img = document.getElementById("characterImg");
const textEl = document.getElementById("text");
const opts = document.getElementById("optionsArea");

function showScene() {
  const s = story[index];
  img.src = s.c || "";
  textEl.innerHTML = "";
  opts.innerHTML = "";

  typeText(s.t, () => {
    if (s.input) {
      const input = document.createElement("input");
      input.className = "wish-input";
      input.placeholder = "写下你的愿望";
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = "确认";
      btn.onclick = () => { index++; showScene(); };
      opts.append(input, btn);
      return;
    }

    if (s.opt) {
      s.opt.forEach(o => {
        const b = document.createElement("button");
        b.className = "option-btn";
        b.textContent = o.t;
        b.onclick = () => { index = o.n; showScene(); };
        opts.appendChild(b);
      });
      return;
    }

    if (s.back) {
      visited.add(index);
      const backBtn = document.createElement("button");
      backBtn.className = "option-btn";
      backBtn.textContent = "返回选择";
      backBtn.onclick = () => { index = 4; showScene(); };
      opts.appendChild(backBtn);

      if (visited.size >= 3) {
        setTimeout(() => { index = 17; showScene(); }, 1200);
      }
      return;
    }

    const nextBtn = document.createElement("button");
    nextBtn.className = "option-btn";
    nextBtn.textContent = s.end ? "生日快乐！" : "继续";
    nextBtn.onclick = () => { index++; showScene(); };
    opts.appendChild(nextBtn);
  });
}

function typeText(str, callback) {
  let i = 0;
  textEl.innerHTML = "";

  function step() {
    if (i < str.length) {
      textEl.innerHTML = str.slice(0, i + 1) + '<span id="cursor">|</span>';
      i++;
      setTimeout(step, typingSpeed);
    } else {
      callback();
    }
  }
  step();
}

showScene();
</script>
</body>
</html>
